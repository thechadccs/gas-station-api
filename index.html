<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Station Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --bg: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: var(--blue); color: white; }
        #tank-ui { width: 70px; height: 160px; background: #cbd5e1; border: 3px solid #94a3b8; position: relative; margin: 20px auto; cursor: crosshair; }
        #fuel-level { position: absolute; bottom: 0; width: 100%; background: #f59e0b; transition: 0.3s; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .addr { color: var(--blue); text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div>
    <div class="card">
        <h2><i class="fas fa-search"></i> Filters</h2>
        <label>Province:</label>
        <input list="prov-list" id="prov" placeholder="Type Province..." oninput="handleProvInput()">
        <datalist id="prov-list"></datalist>

        <label>Municipality:</label>
        <input list="muni-list" id="muni" placeholder="Select Province first" disabled>
        <datalist id="muni-list"></datalist>

        <label>Fuel:</label>
        <select id="fuel">
            <option value="Precio Gasolina 95 E5">Gasolina 95 E5</option>
            <option value="Precio Gasóleo A">Gasóleo A</option>
        </select>

        <button class="btn" onclick="performSearch()">FETCH DATA</button>
    </div>

    <div id="res-card" class="card" style="display:none; margin-top: 20px;">
        <table>
            <thead><tr><th>Brand</th><th>Price</th><th>Dist</th><th>Address</th></tr></thead>
            <tbody id="res-body"></tbody>
        </table>
    </div>
</div>

<div class="card">
    <h3>Calculator</h3>
    <div id="tank-ui" onclick="setTank(event)">
        <div id="fuel-level" style="height: 25%;"></div>
    </div>
    <label>Liters (%):</label>
    <input type="number" id="perc" value="25" oninput="updateTank()">
    <label>Total Cost:</label>
    <input type="text" id="cost" readonly style="font-weight:bold; color:green; text-align:center">
</div>

<script>
    const API = "https://gas-station-api-wlsi.onrender.com"; 
    let provMap = {}, selectedPrice = 0, timer;

    async function loadProvinces() {
        try {
            const r = await fetch(`${API}/provinces`);
            const data = await r.json();
            // Critical: Accessing the specific key "ListaProvincias"
            const list = data.ListaProvincias || [];
            const dl = document.getElementById('prov-list');
            list.forEach(p => {
                provMap[p.Provincia.toUpperCase()] = p.IDPovincia;
                dl.innerHTML += `<option value="${p.Provincia}">`;
            });
        } catch (e) { console.error("Initial Load Error", e); }
    }

    function handleProvInput() {
        clearTimeout(timer);
        timer = setTimeout(async () => {
            const val = document.getElementById('prov').value.toUpperCase();
            if (provMap[val]) {
                const mInput = document.getElementById('muni');
                mInput.disabled = false;
                const r = await fetch(`${API}/municipalities/${provMap[val]}`);
                const data = await r.json();
                const list = data.ListaMunicipios || [];
                document.getElementById('muni-list').innerHTML = list.map(m => `<option value="${m.Municipio}">`).join('');
            }
        }, 500);
    }

    async function performSearch() {
        const muni = document.getElementById('muni').value;
        const prov = document.getElementById('prov').value;
        const fuel = document.getElementById('fuel').value;
        
        try {
            const r = await fetch(`${API}/search?municipality=${muni}&fuel_key=${fuel}&radius=50&province=${prov}`);
            const data = await r.json();
            if (!data.stations) return;

            document.getElementById('res-card').style.display = 'block';
            document.getElementById('res-body').innerHTML = data.stations.map(s => `
                <tr onclick="selectedPrice=${s.price};calc()">
                    <td>${s.brand}</td>
                    <td>${s.price.toFixed(3)}€</td>
                    <td>${s.distance}km</td>
                    <td class="addr" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(s.address)}')">${s.address}</td>
                </tr>`).join('');
        } catch (e) { alert("Search failed. Check console."); }
    }

    function setTank(e) {
        const rect = document.getElementById('tank-ui').getBoundingClientRect();
        const p = Math.round(100 - ((e.clientY - rect.top) / rect.height * 100));
        document.getElementById('perc').value = p;
        updateTank();
    }

    function updateTank() {
        document.getElementById('fuel-level').style.height = document.getElementById('perc').value + "%";
        calc();
    }

    function calc() {
        if (!selectedPrice) return;
        const litersToFill = 50 * (1 - (document.getElementById('perc').value / 100));
        document.getElementById('cost').value = (litersToFill * selectedPrice).toFixed(2) + " €";
    }

    window.onload = loadProvinces;
</script>
</body>
</html>
