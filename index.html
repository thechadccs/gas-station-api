<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Station Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --blue: #2563eb; --gray: #f8fafc; --border: #e2e8f0; }
        body { font-family: sans-serif; background: #f1f5f9; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:disabled { background: #f1f5f9; color: #94a3b8; }
        .btn { width: 100%; background: var(--blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        /* Tank Styles */
        #tank-ui { display: flex; gap: 20px; margin-top: 15px; align-items: center; }
        #tank-visual { width: 70px; height: 140px; background: #cbd5e1; border: 3px solid #94a3b8; border-radius: 4px; position: relative; overflow: hidden; cursor: pointer; }
        #fuel-fill { position: absolute; bottom: 0; width: 100%; background: #f59e0b; transition: 0.3s; }
        
        .station { border-left: 5px solid var(--blue); padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; background: white; border-radius: 8px; }
        .price { color: #059669; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0"><i class="fas fa-filter"></i> Search Filters</h2>
    <label>Province:</label>
    <input list="provs" id="prov_input" placeholder="Start typing..." oninput="checkProv()">
    <datalist id="provs"></datalist>

    <label>Municipality:</label>
    <input list="munis" id="muni_input" placeholder="Select Province first" disabled oninput="checkMuni()">
    <datalist id="munis"></datalist>

    <label>Fuel Type:</label>
    <select id="fuel"><option value="95">Gasolina 95</option><option value="diesel">Diesel</option></select>

    <label>Radius: <span id="rad_val">5</span> km</label>
    <input type="range" id="radius" min="1" max="50" value="5" oninput="document.getElementById('rad_val').innerText=this.value">

    <button class="btn" onclick="search()">FETCH FROM API</button>
</div>

<div class="card">
    <h2 style="margin:0"><i class="fas fa-calculator"></i> Refuel Calculator</h2>
    <div id="tank-ui">
        <div id="tank-visual" onclick="setTank(event)"><div id="fuel-fill" style="height: 25%"></div></div>
        <div style="flex:1">
            <label>Capacity (L):</label><input type="number" id="cap" value="50" oninput="calc()">
            <label>Current (%):</label><input type="number" id="perc" value="25" oninput="updateTank()">
            <label>Cost to fill:</label><input type="text" id="cost" readonly style="background:#f8fafc">
        </div>
    </div>
</div>

<div id="results"></div>

<script>
    const API = "https://YOUR_RENDER_URL.onrender.com"; // 👈 REPLACE THIS
    let provMap = {}; 
    let selectedPrice = 0;

    async function init() {
        const res = await fetch(`${API}/provinces`);
        const data = await res.json();
        const dl = document.getElementById('provs');
        data.forEach(p => {
            provMap[p.Provincia.toUpperCase()] = p.IDPovincia;
            let opt = document.createElement('option'); opt.value = p.Provincia;
            dl.appendChild(opt);
        });
    }

    async function checkProv() {
        const val = document.getElementById('prov_input').value.toUpperCase();
        const mInput = document.getElementById('muni_input');
        if (provMap[val]) {
            mInput.disabled = false; mInput.placeholder = "Loading...";
            const res = await fetch(`${API}/municipalities/${provMap[val]}`);
            const data = await res.json();
            const dl = document.getElementById('munis'); dl.innerHTML = "";
            data.forEach(m => { let opt = document.createElement('option'); opt.value = m.Municipio; dl.appendChild(opt); });
            mInput.placeholder = "Select city...";
        } else { mInput.disabled = true; }
    }

    function setTank(e) {
        const rect = e.currentTarget.getBoundingClientRect();
        const p = Math.round(100 - ((e.clientY - rect.top) / rect.height * 100));
        document.getElementById('perc').value = p; updateTank();
    }

    function updateTank() {
        const p = document.getElementById('perc').value;
        document.getElementById('fuel-fill').style.height = p + "%"; calc();
    }

    function calc() {
        if (!selectedPrice) return;
        const total = document.getElementById('cap').value * (1 - (document.getElementById('perc').value / 100)) * selectedPrice;
        document.getElementById('cost').value = total.toFixed(2) + " €";
    }

    async function search() {
        const m = document.getElementById('muni_input').value;
        const f = document.getElementById('fuel').value;
        const r = document.getElementById('radius').value;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "Searching...";
        
        const resp = await fetch(`${API}/search?municipality=${m}&fuel_type=${f}&radius=${r}`);
        const data = await resp.json();
        resDiv.innerHTML = "";
        data.stations.forEach(s => {
            const div = document.createElement('div'); div.className = "station";
            div.innerHTML = `<div onclick="selectedPrice=${s.price};calc()"><b>${s.brand}</b><br><small>${s.address}</small></div><div class="price">${s.price.toFixed(3)}€</div>`;
            resDiv.appendChild(div);
        });
    }

    window.onload = init;
</script>
</body>
</html>
